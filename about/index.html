<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - The web site of stroy</title>
  <link href="/style.css" rel="stylesheet" type="text/css" media="all">
  <style>
    .terminal {
      background-color: black;
      background-image: radial-gradient(rgba(0, 150, 0, 0.75), black 120%);
      height: 80vh;
      padding: 10vh 10vw;
      color: white;
      font: 1.3rem Inconsolata, monospace;
      text-shadow: 0 0 5px #C8C8C8;
      max-width: 100vw;
      position: relative;
    }
    .terminalx::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
    }
    ::selection {
      background: #0080FF;
      text-shadow: none;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 100%;
      overflow: auto;
    }
  </style>
</head>
<body>

  </div>
